name: E2E Web Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install root dependencies
      run: npm install

    - name: Install testing dependencies
      run: npm install
      working-directory: ./testing/web-tests

    - name: Start Vite Dev Server
      run: npm run dev &
      
    - name: Wait for dev server to be ready
      run: |
        echo "Waiting for http://localhost:5173 to be ready..."
        timeout 60 bash -c 'until curl -s http://localhost:5173 > /dev/null; do sleep 2; done'
        echo "Server is up!"

    - name: Run E2E Tests
      env:
        # These secrets need to be added in your GitHub Repository settings -> Secrets and variables -> Actions
        CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
        CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
        BUSINESS_EMAIL: ${{ secrets.BUSINESS_EMAIL }}
        BUSINESS_PASSWORD: ${{ secrets.BUSINESS_PASSWORD }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        HEADLESS: "true"
      run: npm run test:web

    - name: Upload Test Report & Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-and-screenshots
        path: |
          testing/web-tests/reports/web-test-report.xlsx
          testing/web-tests/reports/screenshots/
